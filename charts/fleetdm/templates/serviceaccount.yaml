{{- if .Values.fleet.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fleetdm.serviceAccountName" . }}
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
  {{- with .Values.fleet.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
